<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Physics Sandbox</title>
    <style>
        /* --- CORE STYLES --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #111827;
            color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-y: auto !important; /* ENABLED SCROLLING */
            touch-action: auto !important; /* ENABLED TOUCH */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #canvasContainer {
            flex-grow: 1;
            position: relative;
            background: #000;
            cursor: crosshair;
            touch-action: none; /* Keep drawing smooth */
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* --- SIDEBAR & TABS --- */
        .controls {
            background-color: #1f2937;
            padding: 15px;
            border-top: 2px solid #374151;
            max-height: 50vh;
            overflow-y: auto;
        }

        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
            border-bottom: 1px solid #374151;
        }

        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: #374151;
            color: #9ca3af;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            flex-shrink: 0;
        }

        .tab-btn.active {
            background: #60a5fa;
            color: white;
        }

        .tab-content {
            display: none;
            max-height: 300px;
            overflow-y: auto; /* ENABLED VERTICAL SCROLL */
        }

        .tab-content.active { display: block; }

        .elements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            padding: 10px 0;
        }

        .element-btn {
            background: #374151;
            border: 2px solid transparent;
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 0.8rem;
        }

        .element-btn:hover { background: #4b5563; }
        .element-btn.active { border-color: #60a5fa; background: #1e3a8a; }

        /* --- BOTTOM CONTROLS --- */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #374151;
        }
    </style>
</head>
<body>
    <div id="canvasContainer">
        <canvas id="sandboxCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="showTab('elements')">Elements</button>
            <button class="tab-btn" onclick="showTab('life')">Life</button>
            <button class="tab-btn" onclick="showTab('tools')">Tools</button>
            <button class="tab-btn" onclick="showTab('settings')">Settings</button>
        </div>

        <div id="elements" class="tab-content active">
            <div class="elements-grid" id="elementsGrid">
                <!-- Elements generated by JS -->
            </div>
        </div>

        <div id="life" class="tab-content">
            <div class="elements-grid" id="lifeGrid">
                <!-- Life elements generated by JS -->
            </div>
        </div>

        <div id="tools" class="tab-content">
            <div class="elements-grid">
                <button class="element-btn" onclick="clearCanvas()">Clear All</button>
                <button class="element-btn" onclick="togglePause()">Pause/Play</button>
            </div>
        </div>

        <div class="bottom-bar">
            <div>
                <label>Brush Size: </label>
                <input type="range" id="brushSize" min="1" max="20" value="5">
            </div>
            <div id="fpsCounter">FPS: 60</div>
        </div>
    </div>

    <!-- Replace the Script below with your actual game script if you have it! -->
    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        // Your actual physics engine code should go here...
    </script>
</body>
</html>
